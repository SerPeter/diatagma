# Frontmatter schema — validation rules for task metadata
# -------------------------------------------------------

# Fields present on every task
required_fields:
  - id
  - title
  - status
  - type
  - created

# Fields required when status transitions
required_by_status:
  in-progress:
    - assignee
  in-review:
    - assignee
  done:
    - assignee

# Field type constraints
field_types:
  id:
    type: string
    pattern: "^[A-Z]{1,5}-\\d{3,}$"
  title:
    type: string
    max_length: 120
  status:
    type: enum
    values: [pending, in-progress, in-review, done, cancelled]
  type:
    type: enum
    values: [epic, feature, bug, spike, chore, docs]
  business_value:
    type: integer
    min: -1000
    max: 1000
  story_points:
    type: enum
    values: [1, 2, 3, 5, 8, 13, 21]
  tags:
    type: list
    item_type: string
  dependencies:
    type: list
    item_type: string
    pattern: "^[A-Z]{1,5}-\\d{3,}$"
  blocked_by:
    type: list
    item_type: string
    pattern: "^[A-Z]{1,5}-\\d{3,}$"
  assignee:
    type: string
  due_date:
    type: date
  sprint:
    type: string
  parent:
    type: string
    pattern: "^[A-Z]{1,5}-\\d{3,}$"
